name: Feature Request form
description: Suggest a new idea for this project.
title: "[Feature Request]: "
labels: ["enhancement"]
projects: ["Mystical Realms"]
assignees:
  - daemon-node-byte
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this feature request!
        Please tell us about the feature you would like to see implemented.
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@emample.com
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/daemon-node-byte/Mystical-Realms/blob/main/docs/CODE_OF_CONDUCT.md). 
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true